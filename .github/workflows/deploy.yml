name: Spring Boot CI/CD to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Stop the whole job if it takes more than 10 minutes
    timeout-minutes: 10 

    steps:
      # 1. Get the latest code
      - uses: actions/checkout@v4

      # 2. Set up Java with caching for your specific subfolder
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          # Matches your folder structure: demo-backend1/pom.xml
          cache-dependency-path: 'demo-backend1/pom.xml'

      # 3. Build the JAR from the subfolder
      - name: Build with Maven
        run: mvn clean package -DskipTests -f demo-backend1/pom.xml

      # 4. Copy JAR file to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          # Fail quickly if AWS blocks the connection (Port 22)
          timeout: 40s
          command_timeout: 5m
          # Points to the exact build output
          source: "demo-backend1/target/*.jar"
          target: "/home/ec2-user/app"
          # strip_components: 2 removes 'demo-backend1/target/' from the remote path
          strip_components: 2

      # 5. SSH into EC2 and Restart Application
      - name: Restart Application on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          connect_timeout: 40s
          script: |
            # 1. Create target folder if missing
            mkdir -p /home/ec2-user/app
            
            # 2. Kill the old version (ignores error if nothing is running)
            sudo pkill -f java || true
            
            # 3. Start the new version in the background
            # JAR is directly in /app because we used strip_components: 2 above
            nohup java -jar /home/ec2-user/app/*.jar > /home/ec2-user/app/app.log 2>&1 &
            
            # 4. Wait to ensure it starts
            sleep 5
