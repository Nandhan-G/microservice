name: Spring Boot CI/CD to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          # Point to the actual nested pom.xml location
          cache-dependency-path: 'microservice/demo-backend1/pom.xml'

      # 1. Build the project using the subfolder POM
      - name: Build with Maven
        # -f tells Maven where to find the project file
        run: mvn clean package -DskipTests -f microservice/demo-backend1/

      # 2. Copy the resulting JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          # SOURCE: Path where Maven generated the JAR file
          source: "microservice/demo-backend1/target/*.jar"
          target: "/home/ec2-user/app"
          # STRIP: Removes "microservice/demo-backend1/target/" from the remote path
          # This ensures the JAR is placed directly in /home/ec2-user/app/
          strip_components: 3

      # 3. Restart the application on EC2
      - name: Restart Application on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Stop the existing process
            sudo pkill -f java || true
            # Run the new JAR located directly in the target folder
            nohup java -jar /home/ec2-user/app/*.jar > /home/ec2-user/app/app.log 2>&1 &
