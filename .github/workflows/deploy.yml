name: Spring Boot CI/CD to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: 'microservice/demo-backend1/pom.xml'

      # 1. Build the Application
      - name: Build with Maven
        run: mvn clean package -DskipTests -f microservice/demo-backend1/pom.xml

      # 2. Copy JAR file to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          # FIX: Specify the exact path to the JAR file
          source: "microservice/demo-backend1/target/*.jar"
          target: "/home/ec2-user/app"
          # FIX: strip_components: 3 removes 'microservice/demo-backend1/target/' 
          # so the JAR drops directly into '/home/ec2-user/app'
          strip_components: 3

      # 3. SSH into EC2 and Restart
      - name: Restart Application on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Create directory if it doesn't exist
            mkdir -p /home/ec2-user/app
            
            # Stop existing java process
            sudo pkill -f java || true

            # Run the JAR (it's now directly in the /app folder)
            nohup java -jar /home/ec2-user/app/*.jar > /home/ec2-user/app/app.log 2>&1 &
