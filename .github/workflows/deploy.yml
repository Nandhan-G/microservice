name: Spring Boot CI/CD to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the code from GitHub
      - uses: actions/checkout@v4

      # 2. Set up Java 17 for the build process
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build the Application (Generates the JAR file)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Copy JAR file to EC2 using SCP
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/app"

      # 5. SSH into EC2 and Restart Application
      - name: Restart Application on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Stop any existing java process (if running)
            sudo pkill -f java || true

            # Start the new application and fix the path error from the PDF
            # We use 'nohup' so the app keeps running after the SSH session closes
            nohup java -jar /home/ec2-user/app/target/*.jar > /home/ec2-user/app/app.log 2>&1 &








